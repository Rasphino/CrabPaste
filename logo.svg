<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="crabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B5B"/>
      <stop offset="100%" stop-color="#E54B3C"/>
    </linearGradient>
    <linearGradient id="tableGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="100%" stop-color="#4A7CE5"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1A1A2E"/>

  <!-- Crab legs — 3 pairs -->
  <g stroke="#E54B3C" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7">
    <!-- Left legs -->
    <path d="M190 360 L155 400"/>
    <path d="M180 350 L135 380"/>
    <path d="M175 335 L130 355"/>
    <!-- Right legs -->
    <path d="M322 360 L357 400"/>
    <path d="M332 350 L377 380"/>
    <path d="M337 335 L382 355"/>
  </g>

  <!-- Crab body -->
  <ellipse cx="256" cy="330" rx="64" ry="42" fill="url(#crabGrad)"/>

  <!-- Eyes on stalks -->
  <g>
    <!-- Left stalk -->
    <line x1="224" y1="310" x2="206" y2="280" stroke="#E54B3C" stroke-width="6" stroke-linecap="round"/>
    <circle cx="204" cy="276" r="10" fill="white"/>
    <circle cx="206" cy="274" r="5" fill="#1A1A2E"/>
    <circle cx="208" cy="272" r="2" fill="white"/>
    <!-- Right stalk -->
    <line x1="288" y1="310" x2="306" y2="280" stroke="#E54B3C" stroke-width="6" stroke-linecap="round"/>
    <circle cx="308" cy="276" r="10" fill="white"/>
    <circle cx="310" cy="274" r="5" fill="#1A1A2E"/>
    <circle cx="312" cy="272" r="2" fill="white"/>
  </g>

  <!-- Smile -->
  <path d="M238 335 Q256 348 274 335" fill="none" stroke="#B33020" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left claw arm -->
  <path d="M195 310 Q160 270 130 250" fill="none" stroke="url(#crabGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left claw pincer -->
  <g fill="url(#crabGrad)">
    <path d="M130 250 Q100 230 95 240 Q88 254 110 260 Q118 262 130 250Z"/>
    <path d="M130 250 Q108 220 105 232 Q100 248 120 258Z"/>
  </g>

  <!-- Right claw arm -->
  <path d="M317 310 Q352 270 382 250" fill="none" stroke="url(#crabGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right claw pincer -->
  <g fill="url(#crabGrad)">
    <path d="M382 250 Q412 230 417 240 Q424 254 402 260 Q394 262 382 250Z"/>
    <path d="M382 250 Q404 220 407 232 Q412 248 392 258Z"/>
  </g>

  <!-- Table held up by claws -->
  <g>
    <!-- Table body -->
    <rect x="128" y="140" width="256" height="114" rx="8" fill="url(#tableGrad)"/>
    <!-- Table header -->
    <rect x="128" y="140" width="256" height="32" rx="8" fill="#3A6DD8"/>
    <!-- Header text bars -->
    <rect x="142" y="150" width="56" height="10" rx="3" fill="#8BB8FF" opacity="0.7"/>
    <rect x="214" y="150" width="44" height="10" rx="3" fill="#8BB8FF" opacity="0.7"/>
    <rect x="274" y="150" width="64" height="10" rx="3" fill="#8BB8FF" opacity="0.7"/>
    <!-- Grid lines -->
    <line x1="198" y1="140" x2="198" y2="254" stroke="#7BAAFF" stroke-width="1" opacity="0.4"/>
    <line x1="264" y1="140" x2="264" y2="254" stroke="#7BAAFF" stroke-width="1" opacity="0.4"/>
    <line x1="128" y1="172" x2="384" y2="172" stroke="#7BAAFF" stroke-width="1" opacity="0.4"/>
    <line x1="128" y1="200" x2="384" y2="200" stroke="#7BAAFF" stroke-width="1" opacity="0.25"/>
    <line x1="128" y1="228" x2="384" y2="228" stroke="#7BAAFF" stroke-width="1" opacity="0.25"/>
    <!-- Row data bars -->
    <rect x="142" y="184" width="50" height="6" rx="2" fill="#BEDAFF" opacity="0.5"/>
    <rect x="214" y="184" width="38" height="6" rx="2" fill="#BEDAFF" opacity="0.5"/>
    <rect x="274" y="184" width="60" height="6" rx="2" fill="#BEDAFF" opacity="0.5"/>
    <rect x="142" y="212" width="42" height="6" rx="2" fill="#BEDAFF" opacity="0.3"/>
    <rect x="214" y="212" width="52" height="6" rx="2" fill="#BEDAFF" opacity="0.3"/>
    <rect x="142" y="240" width="46" height="6" rx="2" fill="#BEDAFF" opacity="0.2"/>
  </g>
</svg>
