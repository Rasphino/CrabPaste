name: Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: crabpaste-windows
          path: target/release/crabpaste.exe

  build-linux:
    runs-on: ubuntu-22.04
    container: ubuntu:20.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: Asia/Shanghai
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl wget file \
            build-essential pkg-config \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev librsvg2-bin

      - uses: dtolnay/rust-toolchain@stable
      - name: Build debug
        run: cargo build

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
            AppDir/usr/share/icons/hicolor/256x256/apps \
            AppDir/usr/share/icons/hicolor/48x48/apps

          cp target/debug/crabpaste AppDir/usr/bin/

          cat > AppDir/usr/share/applications/crabpaste.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=CrabPaste
          Comment=BI Table Paster
          Exec=crabpaste
          Icon=crabpaste
          Type=Application
          Categories=Utility;
          DESKTOP

          ln -s usr/share/applications/crabpaste.desktop AppDir/crabpaste.desktop

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/crabpaste" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          rsvg-convert -w 256 -h 256 logo.svg -o AppDir/usr/share/icons/hicolor/256x256/apps/crabpaste.png
          rsvg-convert -w 48 -h 48 logo.svg -o AppDir/usr/share/icons/hicolor/48x48/apps/crabpaste.png

          ln -s usr/share/icons/hicolor/256x256/apps/crabpaste.png AppDir/crabpaste.png

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir crabpaste.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: crabpaste-linux-appimage
          path: crabpaste.AppImage
